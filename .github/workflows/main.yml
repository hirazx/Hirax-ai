name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build for Linux
      run: |
        pyinstaller --onefile --name="HiraxAI-Linux" --add-data="frontend:frontend" --add-data="backend:backend" run.py
        mv dist/HiraxAI-Linux .
    
    - name: Build for Windows (cross)
      run: |
        pip install pyinstaller
        pyinstaller --onefile --windowed --name="HiraxAI-Windows.exe" --add-data="frontend;frontend" --add-data="backend;backend" run.py
        mv dist/HiraxAI-Windows.exe .
    
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          HiraxAI-Linux
          HiraxAI-Windows.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
